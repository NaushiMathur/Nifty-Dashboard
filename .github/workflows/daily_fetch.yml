# Nifty 50 Dashboard — Daily Auto-Fetch
# Runs every weekday at 10:30 UTC = 4:00pm IST (after NSE market close)
# Also runs on every push to main (for testing)

name: Daily Nifty 50 Data Fetch

on:
  schedule:
    - cron: "30 10 * * 1-5"   # Mon–Fri, 10:30 UTC = 4:00pm IST
  workflow_dispatch:           # Manual trigger from GitHub UI (for testing)
    inputs:
      force:
        description: "Force fetch even on weekends/holidays (for testing)"
        required: false
        default: "false"
  push:
    branches: [main]

# Allow GITHUB_TOKEN to push commits back to the repo
permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

