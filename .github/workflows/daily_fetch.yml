# Nifty 50 Dashboard — Daily Auto-Fetch
# Runs every weekday at 10:30 UTC = 4:00pm IST (after NSE market close)
# Also runs on every push to main (for testing)

name: Daily Nifty 50 Data Fetch

on:
  schedule:
    - cron: "30 10 * * 1-5"   # Mon-Fri, 10:30 UTC = 4:00pm IST
  workflow_dispatch:           # Manual trigger from GitHub UI
  push:
    branches: [main]

# Allow GITHUB_TOKEN to push commits back to the repo
permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch Nifty 50 data
        run: python fetch_data.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "Nifty Dashboard Bot"
          git config --global user.email "bot@nifty-dashboard"
          git add nifty_data.json last_successful_run.txt fetch_log.txt
          if git diff --staged --quiet; then
            echo "No data changes to commit (likely a market holiday)."
          else
            git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
