# Nifty 50 Dashboard — Daily Auto-Fetch
# Runs every weekday at 10:30 UTC = 4:00pm IST (after NSE market close)
# Also runs on every push to main (for testing)

name: Daily Nifty 50 Data Fetch

on:
  schedule:
    - cron: "30 10 * * 1-5"   # Mon–Fri, 10:30 UTC = 4:00pm IST
  workflow_dispatch:            # Manual trigger from GitHub UI (for testing)
  push:
    branches: [main]

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      # 4. Run the fetch script
      - name: Fetch Nifty 50 data
        run: python fetch_data.py

      # 5. Commit the updated data file back to the repo
      - name: Commit updated data
        run: |
          git config --global user.name  "Nifty Dashboard Bot"
          git config --global user.email "bot@nifty-dashboard"
          git add nifty_data.json last_successful_run.txt fetch_log.txt
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
